<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoBank — Schema Visualizer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0d0f17;
      --surface: #161924;
      --surface2: #1e2235;
      --border: #2a2f4a;
      --text: #e8ecf5;
      --text2: #8892b0;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff6b6b;
      --warn: #ffd93d;
      --info: #74b9ff;
      --green: #00d4aa;
      --purple: #6c63ff;
      --blue: #74b9ff;
      --orange: #ff9f43;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo svg {
      width: 32px;
      height: 32px
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .logo-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 400
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Inter', sans-serif;
    }

    .btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .btn.active {
      background: var(--accent);
      border-color: var(--accent)
    }

    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      color: var(--text2)
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px
    }

    #stats {
      display: flex;
      gap: 16px;
      font-size: 12px
    }

    .stat {
      color: var(--text2)
    }

    .stat b {
      color: var(--text)
    }

    #canvas-wrap {
      position: relative;
      width: 100%;
      height: calc(100vh - 57px);
      overflow: hidden;
      cursor: grab
    }

    #canvas-wrap.dragging {
      cursor: grabbing
    }

    #canvas {
      position: absolute;
      transform-origin: 0 0
    }

    .table-node {
      position: absolute;
      min-width: 240px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
      transition: box-shadow .2s, border-color .2s;
      user-select: none;
      cursor: move;
    }

    .table-node:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(108, 99, 255, .2)
    }

    .table-node.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(108, 99, 255, .3)
    }

    .table-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 11px 11px 0 0;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .table-icon {
      font-size: 16px
    }

    .row-count {
      margin-left: auto;
      font-size: 10px;
      opacity: .7;
      font-weight: 400;
      font-family: 'JetBrains Mono', monospace
    }

    .table-cols {
      padding: 6px 0
    }

    .col-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 14px;
      font-size: 11.5px;
      color: var(--text2);
      transition: background .15s;
    }

    .col-row:hover {
      background: var(--surface2)
    }

    .col-name {
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      min-width: 110px
    }

    .col-type {
      font-size: 10px;
      opacity: .65;
      font-family: 'JetBrains Mono', monospace
    }

    .col-badge {
      margin-left: auto;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .pk {
      background: rgba(255, 211, 61, .15);
      color: var(--warn);
      border: 1px solid rgba(255, 211, 61, .3)
    }

    .fk {
      background: rgba(116, 185, 255, .15);
      color: var(--blue);
      border: 1px solid rgba(116, 185, 255, .3)
    }

    .uq {
      background: rgba(0, 212, 170, .15);
      color: var(--green);
      border: 1px solid rgba(0, 212, 170, .3)
    }

    .nn {
      background: rgba(108, 99, 255, .1);
      color: var(--accent);
      border: 1px solid rgba(108, 99, 255, .2)
    }

    svg#svg-lines {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: visible
    }

    .fk-line {
      stroke: var(--accent);
      stroke-width: 1.5;
      fill: none;
      opacity: .5;
      stroke-dasharray: 5 4
    }

    .fk-line:hover {
      opacity: 1
    }

    .arrow-head {
      fill: var(--accent)
    }

    #tooltip {
      position: fixed;
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 999;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .5);
      line-height: 1.6;
    }

    #minimap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 200px;
      height: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 200;
    }

    #minimap canvas {
      width: 100%;
      height: 100%
    }

    .zoom-controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 200;
    }

    .zoom-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .zoom-btn:hover {
      background: var(--accent);
      border-color: var(--accent)
    }

    #zoom-label {
      width: 36px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

      <button class="btn" onclick="resetLayout()">↺ Reset</button>
    </div>
  </header>

  <div id="canvas-wrap">
    <div id="canvas">
      <svg id="svg-lines">
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" class="arrow-head" />
          </marker>
        </defs>
      </svg>
    </div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoom(1.2)" title="Zoom In">+</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="zoom(0.83)" title="Zoom Out">−</button>
    <button class="zoom-btn" onclick="fitAll()" title="Fit All" style="font-size:14px">⊡</button>
  </div>

      {
        id: "ft_security_answers", label: "ft_security_answers", icon: "🔐", category: "auth",
        desc: "Stores hashed answers to security questions for password recovery.",
        cols: [
          { n: "id", t: "text", pk: true }, { n: "user_id", t: "text", fk: "ft_users", nn: true },
          { n: "question_id", t: "int", nn: true }, { n: "answer_hash", t: "text", nn: true },
          { n: "created_at", t: "timestamptz", nn: true }, { n: "updated_at", t: "timestamptz", nn: true }
        ]
      }
    ];

    const CAT_COLORS = { auth: "#6c63ff", finance: "#00d4aa", ops: "#74b9ff", support: "#ff9f43" };
    const LAYOUT = [
      { id: "ft_users", x: 480, y: 40 }, { id: "ft_accounts", x: 860, y: 40 },
      { id: "ft_ledger", x: 1220, y: 40 }, { id: "ft_security_answers", x: 100, y: 40 },
      { id: "ft_audit", x: 860, y: 360 }, { id: "ft_cards", x: 1220, y: 360 },
      { id: "ft_loans", x: 480, y: 360 }, { id: "ft_loan_payments", x: 100, y: 360 },
      { id: "ft_beneficiaries", x: 100, y: 660 }, { id: "ft_notifications", x: 480, y: 660 },
      { id: "ft_kyc_documents", x: 860, y: 660 }, { id: "ft_transaction_requests", x: 1220, y: 660 },
      { id: "ft_exchange_rates", x: 100, y: 980 }, { id: "ft_support_tickets", x: 480, y: 980 },
    ];

    let scale = 0.72, panX = 20, panY = 10;
    let dragging = null, dragOffX = 0, dragOffY = 0;
    let panStart = null;
    const canvas = document.getElementById("canvas");
    const svg = document.getElementById("svg-lines");
    const wrap = document.getElementById("canvas-wrap");
    const nodeEls = {};

    function buildNodes() {
      let totalCols = 0, totalFks = 0;
      SCHEMA.forEach(tbl => {
        const pos = LAYOUT.find(l => l.id === tbl.id) || { x: 100, y: 100 };
        const div = document.createElement("div");
        div.className = "table-node";
        div.id = "node_" + tbl.id;
        div.style.left = pos.x + "px";
        div.style.top = pos.y + "px";
        const color = CAT_COLORS[tbl.category] || "#6c63ff";
        const fkCols = tbl.cols.filter(c => c.fk);
        totalFks += fkCols.length;
        totalCols += tbl.cols.length;
        div.innerHTML = `
      <div class="table-head" style="background:${color}18;border-bottom-color:${color}40">
        <span class="table-icon">${tbl.icon}</span>
        <span style="color:${color}">${tbl.label}</span>
        <span class="row-count">${tbl.cols.length} cols</span>
      </div>
      <div class="table-cols">
        ${tbl.cols.map(c => `
          <div class="col-row" title="${c.n} : ${c.t}${c.fk ? ' → ' + c.fk : ''}">
            <span class="col-name">${c.n}</span>
            <span class="col-type">${c.t}</span>
            ${c.pk ? `<span class="col-badge pk">PK</span>` : c.fk ? `<span class="col-badge fk">FK</span>` : c.uq ? `<span class="col-badge uq">UQ</span>` : c.nn ? `<span class="col-badge nn">NN</span>` : ''}
          </div>`).join("")}
      </div>`;
        div.addEventListener("mousedown", e => startDrag(e, div));
        div.addEventListener("mouseenter", () => div.classList.add("selected"));
        div.addEventListener("mouseleave", () => div.classList.remove("selected"));
        canvas.appendChild(div);
        nodeEls[tbl.id] = div;
      });
      document.getElementById("s-cols").textContent = totalCols;
      document.getElementById("s-fks").textContent = totalFks;
      setTimeout(drawLines, 80);
    }

    function getCenter(el) {
      const l = parseInt(el.style.left), t = parseInt(el.style.top);
      return {
        x: l + el.offsetWidth / 2, y: t + el.offsetHeight / 2,
        rx: l + el.offsetWidth, ry: t + el.offsetHeight / 2,
        lx: l, ly: t + el.offsetHeight / 2
      };
    }

    function drawLines() {
      while (svg.children.length > 1) svg.removeChild(svg.lastChild);
      let fkCount = 0;
      SCHEMA.forEach(tbl => {
        tbl.cols.filter(c => c.fk).forEach(c => {
          const src = nodeEls[tbl.id]; const dst = nodeEls[c.fk];
          if (!src || !dst) return;
          const s = getCenter(src), d = getCenter(dst);
          const dx = d.x - s.x;
          const x1 = dx > 0 ? s.rx : s.lx, y1 = s.ry;
          const x2 = dx > 0 ? d.lx : d.rx, y2 = d.ly;
          const cx = (x1 + x2) / 2;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", "fk-line");
          path.setAttribute("d", `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
          path.setAttribute("marker-end", "url(#arrow)");
          path.setAttribute("data-src", tbl.id);
          path.setAttribute("data-col", c.n);
          path.setAttribute("data-dst", c.fk);
          path.style.opacity = ".45";
          path.addEventListener("mouseenter", e => {
            path.style.opacity = "1"; path.style.strokeWidth = "2.5";
            showTooltip(e, `<b>${tbl.label}.${c.n}</b><br>→ references <b>${c.fk}</b>`);
          });
          path.addEventListener("mousemove", e => moveTooltip(e));
          path.addEventListener("mouseleave", () => { path.style.opacity = ".45"; path.style.strokeWidth = "1.5"; hideTooltip() });
          svg.appendChild(path);
          fkCount++;
        });
      });
    }

    function startDrag(e, div) {
      if (e.button !== 0) return;
      e.stopPropagation();
      dragging = div;
      dragOffX = e.clientX / scale - parseInt(div.style.left);
      dragOffY = e.clientY / scale - parseInt(div.style.top);
      div.style.zIndex = 100;
    }

    wrap.addEventListener("mousedown", e => {
      if (e.target === wrap || e.target === canvas || e.target === svg) {
        panStart = { x: e.clientX - panX, y: e.clientY - panY };
        wrap.classList.add("dragging");
      }
    });

    window.addEventListener("mousemove", e => {
      if (dragging) {
        const nx = e.clientX / scale - dragOffX;
        const ny = e.clientY / scale - dragOffY;
        dragging.style.left = Math.max(0, nx) + "px";
        dragging.style.top = Math.max(0, ny) + "px";
        drawLines();
      } else if (panStart) {
        panX = e.clientX - panStart.x;
        panY = e.clientY - panStart.y;
        applyTransform();
      }
    });

    window.addEventListener("mouseup", () => {
      if (dragging) { dragging.style.zIndex = ""; dragging = null; }
      panStart = null;
      wrap.classList.remove("dragging");
      minimap();
    });

    wrap.addEventListener("wheel", e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const rect = wrap.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      panX = mx - (mx - panX) * delta;
      panY = my - (my - panY) * delta;
      scale *= delta;
      scale = Math.max(0.2, Math.min(3, scale));
      applyTransform();
    }, { passive: false });

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
      document.getElementById("zoom-label").textContent = Math.round(scale * 100) + "%";
    }

    function zoom(f) { scale *= f; scale = Math.max(0.2, Math.min(3, scale)); applyTransform(); minimap(); }

    function fitAll() {
      if (!Object.keys(nodeEls).length) return;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      Object.values(nodeEls).forEach(el => {
        const l = parseInt(el.style.left), t = parseInt(el.style.top);
        minX = Math.min(minX, l); minY = Math.min(minY, t);
        maxX = Math.max(maxX, l + el.offsetWidth); maxY = Math.max(maxY, t + el.offsetHeight);
      });
      const pw = wrap.clientWidth, ph = wrap.clientHeight;
      const fw = maxX - minX + 80, fh = maxY - minY + 80;
      scale = Math.min(pw / fw, ph / fh, 1);
      panX = (pw - fw * scale) / 2 - minX * scale + 40 * scale;
      panY = (ph - fh * scale) / 2 - minY * scale + 40 * scale;
      applyTransform(); minimap();
    }

    function resetLayout() {
      LAYOUT.forEach(l => {
        const el = nodeEls[l.id];
        if (el) { el.style.left = l.x + "px"; el.style.top = l.y + "px"; }
      });
      drawLines(); fitAll();
    }

    const tooltip = document.getElementById("tooltip");
    function showTooltip(e, html) { tooltip.style.display = "block"; tooltip.innerHTML = html; moveTooltip(e); }
    function moveTooltip(e) { tooltip.style.left = (e.clientX + 12) + "px"; tooltip.style.top = (e.clientY + 12) + "px"; }
    function hideTooltip() { tooltip.style.display = "none"; }

    function minimap() {
      const mc = document.getElementById("mm-canvas");
      const ctx = mc.getContext("2d");
      ctx.clearRect(0, 0, 200, 140);
      ctx.fillStyle = "#161924"; ctx.fillRect(0, 0, 200, 140);
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      Object.values(nodeEls).forEach(el => {
        const l = parseInt(el.style.left), t = parseInt(el.style.top);
        minX = Math.min(minX, l); minY = Math.min(minY, t);
        maxX = Math.max(maxX, l + el.offsetWidth); maxY = Math.max(maxY, t + el.offsetHeight);
      });
      const scl = Math.min(195 / (maxX - minX + 40), 135 / (maxY - minY + 40));
      Object.values(nodeEls).forEach((el, i) => {
        const l = parseInt(el.style.left), t = parseInt(el.style.top);
        const tbl = SCHEMA[i];
        ctx.fillStyle = CAT_COLORS[tbl?.category] || "#6c63ff";
        ctx.globalAlpha = .7;
        ctx.beginPath();
        ctx.roundRect((l - minX + 20) * scl, (t - minY + 20) * scl, el.offsetWidth * scl, el.offsetHeight * scl, 3);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    buildNodes();
    setTimeout(() => { fitAll(); minimap(); }, 200);
  </script>
</body>
